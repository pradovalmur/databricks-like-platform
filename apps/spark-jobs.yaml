apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-jobs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pradovalmur/databricks-like-platform.git
    targetRevision: main
    path: jobs/spark
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
  - group: sparkoperator.k8s.io
    kind: SparkApplication
    jsonPointers:
      - /status
      - /metadata/finalizers